{% extends "base.html" %}
{% block title %}DROGO AEROSPACE — Power Transmission Intelligence{% endblock %}

{% block head %}
<style>
  .home-page{min-height:100vh;display:flex;flex-direction:column;background:var(--bg-base);}
  .cover{
    position:relative;width:100%;flex:1;min-height:580px;display:flex;align-items:center;justify-content:center;
    background:
      url('/static/images/home.png') center 40%/cover no-repeat;
  }
  .logo-center{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:20px;padding:0 20px;transform:translateY(50px);}
  .nova-text{font-family:var(--font);font-size:48px;font-weight:800;letter-spacing:.04em;color:#000000d8;line-height:1;}
  .nova-text span{color:var(--accent-light);}
  .nova-line{width:44px;height:2px;background:var(--accent);border-radius:2px;margin:6px 0;}
</style>
{% endblock %}

{% block body %}
<div class="home-page">
  <nav class="navbar">
    <a href="{{ url_for('home') }}" class="nav-brand">
      <svg class="nav-brand-mark" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Drone Body -->
  <rect x="8" y="9" width="8" height="7" rx="2"
        stroke="currentColor"
        stroke-width="1.4"/>

  <!-- Face (cute eyes) -->
  <circle cx="11" cy="12" r="0.9" fill="currentColor"/>
  <circle cx="13" cy="12" r="0.9" fill="currentColor"/>

  <!-- Smile -->
  <path d="M11 14C11.5 14.6 12.5 14.6 13 14"
        stroke="currentColor"
        stroke-width="1.2"
        stroke-linecap="round"/>

  <!-- Propeller arms -->
  <path d="M8 10L5.5 8.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M16 10L18.5 8.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M8 15L5.5 16.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M16 15L18.5 16.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Propeller dots -->
  <circle cx="5.2" cy="8.2" r="0.8" fill="currentColor"/>
  <circle cx="18.8" cy="8.2" r="0.8" fill="currentColor"/>
  <circle cx="5.2" cy="16.8" r="0.8" fill="currentColor"/>
  <circle cx="18.8" cy="16.8" r="0.8" fill="currentColor"/>

  <!-- Hover float effect base (subtle hover feel even without animation) -->
  <path d="M9 18H15" stroke="currentColor" stroke-width="1" opacity="0.3" stroke-linecap="round"/>

</svg>

DROGO AEROSPACE
    </a>
    <div class="nav-actions">
      {% if session.get('user_id') %}
  <a href="{{ url_for('logout') }}">Logout</a>
  {% else %}
  <a href="{{ url_for('login') }}">Login</a>
  {% endif %}
    </div>
  </nav>

  <div class="cover">
    <div class="logo-center">
        <div class="nova-text">DROGO AEROSPACE<span>+</span></div>
        <div class="nova-line"></div>
    </div>
  </div>
</div>
{% endblock %}
