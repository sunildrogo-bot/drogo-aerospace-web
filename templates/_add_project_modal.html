<!-- ── Add Project Modal (shared by every module) ── -->
<div class="modal-backdrop" id="add-project-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">+ Add Project</div>
      <button class="modal-close" onclick="closeModal('add-project-modal')">×</button>
    </div>
    <form id="add-project-form">
      <div class="modal-grid">
        <div class="field" style="grid-column:1/3;">
          <label>Project Name</label>
          <input id="ap-name" required placeholder="e.g. Chhattisgarh Grid Upgrade"/>
        </div>
        <div class="field">
          <label>Contact No.</label>
          <input id="ap-contact" placeholder="+91 98765 00000"/>
        </div>
        <div class="field">
          <label>Owner Email</label>
          <input id="ap-email" type="email" required placeholder="owner@company.com"/>
        </div>
        <div class="field">
          <label>Country</label>
          <input id="ap-country" placeholder="India"/>
        </div>
        <div class="field">
          <label>State</label>
          <input id="ap-state" placeholder="Madhya Pradesh"/>
        </div>
        <div class="field" style="grid-column:1/3;">
          <label>Company Logo (.jpg / .png)</label>
          <input id="ap-logo" type="file" accept=".jpg,.jpeg,.png"/>
        </div>
      </div>
      <div class="error-msg" id="ap-error" style="display:none;margin-top:14px;"></div>
    </form>
    <div class="modal-footer">
      <button type="button" class="btn-ghost" onclick="closeModal('add-project-modal')">Cancel</button>
      <button type="button" class="btn-primary" id="ap-submit-btn" onclick="submitAddProject()">Save Project</button>
    </div>
  </div>
</div>

<style>
  /* Make plain <input>s inside .field look like the rest of the app even
     without each one repeating the inline style used elsewhere. */
  .modal .field input{
    background:var(--bg-elevated-2);border:1px solid var(--border);border-radius:var(--radius-sm);
    padding:10px 14px;font-size:13.5px;color:var(--text-primary);outline:none;width:100%;font-family:var(--font);
  }
  .modal .field input:focus{border-color:var(--accent);}
  .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:900;align-items:center;justify-content:center;}
  .modal-backdrop.open{display:flex;}
  .modal{background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:520px;padding:28px 32px;box-shadow:0 20px 60px rgba(0,0,0,.18);position:relative;}
  .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
  .modal-title{font-size:17px;font-weight:800;color:var(--text-primary);}
  .modal-close{background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px;line-height:1;font-size:20px;}
  .modal-close:hover{color:var(--text-primary);}
  .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:22px;}
</style>

<script src="{{ url_for('static', filename='js/projects.js') }}"></script>
